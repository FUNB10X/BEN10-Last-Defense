name: BEN10 Last Defense Build

on: [push] 

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
        
      - name: Install dependencies
        run: pip install pygame pyinstaller
        
      - name: Build with PyInstaller
        # แก้ตรงนี้: เปลี่ยน Path ให้ชี้เข้าไปในโฟลเดอร์เกมของคุณ
        run: pyinstaller --windowed --name="BEN10_LastDefense" "Ben10 Last Defense (Antigravity Edition 2)/main.py"
        
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BEN10-LastDefense-${{ matrix.os }}
          path: "Ben10 Last Defense (Antigravity Edition 2)/dist/"
